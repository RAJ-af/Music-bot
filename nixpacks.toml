[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "ffmpeg", "cmake", "rustc", "cargo", "libopus", "libvpx", "pkg-config", "openssl"]

[phases.install]
cmds = [
  "python -m venv /app/.venv",
  "/app/.venv/bin/pip install --upgrade pip",
  "/app/.venv/bin/pip install -r requirements.txt",
  "/app/.venv/bin/python -c \"import dotenv; print('dotenv ok')\""
]

[start]
cmd = "/app/.venv/bin/python bot.py"