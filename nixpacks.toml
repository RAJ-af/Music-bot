[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "ffmpeg", "cmake", "rustc", "cargo", "opus", "libvpx", "pkg-config", "openssl"]

[phases.install]
cmds = [
  "python -m venv /app/.venv",
  "/app/.venv/bin/pip install -r requirements.txt"
]

[start]
cmd = "/app/.venv/bin/python bot.py"